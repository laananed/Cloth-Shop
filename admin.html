<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>蓝绒织梦 · 管理后台</title>
    <meta name="description" content="服装店管理后台，用于查看订单、商品管理、新增商品和统计销量与营业额。" />
    <link rel="stylesheet" href="./src/styles.css?v=20260709-admin-auth-state" />
  </head>

  <body class="admin-page">
    <div class="scroll-tools" data-scroll-tools aria-label="页面滚动快捷按钮">
      <button type="button" class="scroll-tool-button" data-scroll-to="top" aria-label="回到页面顶部">
        ↑
      </button>
      <button type="button" class="scroll-tool-button" data-scroll-to="bottom" aria-label="回到页面底部">
        ↓
      </button>
    </div>

    <section class="admin-login" data-admin-login-panel hidden aria-hidden="true">
      <div class="admin-login__panel">
        <p class="admin-brand__eyebrow">管理员登录</p>
        <h1>登录后进入后台管理</h1>
        <p class="admin-login__hint">请输入管理员邮箱和密码，登录成功后才会加载后台订单、商品和统计数据。</p>

        <form class="admin-login__form" data-admin-login-form>
          <label class="admin-field">
            <span>邮箱</span>
            <input type="email" name="email" data-admin-login-email placeholder="admin@example.com" autocomplete="username" />
          </label>

          <label class="admin-field">
            <span>密码</span>
            <input type="password" name="password" data-admin-login-password placeholder="请输入管理员密码" autocomplete="current-password" />
          </label>

          <button class="admin-submit" type="submit">管理员登录</button>
        </form>

        <p class="admin-login__feedback" data-admin-login-feedback aria-live="polite"></p>

        <a class="admin-login__home-link" href="./index.html" data-admin-login-home>
          返回前台
        </a>
      </div>
    </section>

    <main class="admin-shell" data-admin-shell hidden aria-hidden="true">
      <header class="admin-topbar">
        <div class="admin-topbar__actions">
          <span class="admin-user-chip" data-admin-current-user>未登录</span>
          <button class="admin-user-chip admin-user-chip--button" type="button" data-admin-logout hidden disabled>退出登录</button>
        </div>
        <div class="admin-brand">
          <span class="admin-brand__orb" aria-hidden="true"></span>
          <div>
            <p class="admin-brand__eyebrow">管理后台</p>
            <h1>蓝绒织梦</h1>
          </div>
        </div>
        <a class="admin-home-link" href="./index.html">返回前台</a>
      </header>

      <div class="admin-layout">
        <aside class="admin-nav" aria-label="后台导航">
          <button class="admin-nav__button is-active" type="button" data-admin-nav-target="orders" data-admin-nav-orders>订单查看</button>
          <button class="admin-nav__button" type="button" data-admin-nav-target="products" data-admin-nav-products>商品管理</button>
          <button class="admin-nav__button" type="button" data-admin-nav-target="product-create" data-admin-nav-product-create>新增商品</button>
          <button class="admin-nav__button" type="button" data-admin-nav-target="stats" data-admin-nav-stats>销量统计</button>
        </aside>

        <section class="admin-panels">
          <section class="admin-panel is-active" data-admin-panel="orders">
            <div class="admin-panel__header">
              <div>
                <p class="admin-panel__eyebrow">订单查看</p>
                <h2>用户下单记录</h2>
              </div>
              <p class="admin-panel__note">这里展示数据库中的真实订单记录。</p>
            </div>
            <div class="admin-table-shell" data-admin-orders-table>
              <table class="admin-table">
                <thead>
                  <tr>
                    <th>订单号</th>
                    <th>用户</th>
                    <th>商品</th>
                    <th>金额</th>
                    <th>状态</th>
                    <th>下单时间</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody data-admin-orders-body></tbody>
              </table>
            </div>
          </section>

          <section class="admin-panel" data-admin-panel="products">
            <div class="admin-panel__header">
              <div>
                <p class="admin-panel__eyebrow">商品管理</p>
                <h2>商品库存与上下架</h2>
              </div>
              <p class="admin-panel__note">查看数据库商品，修改 SKU 库存，并控制商品上架或下架。</p>
            </div>

            <div class="admin-panel__stack">
              <div class="admin-summary" data-admin-product-summary hidden></div>

              <div class="admin-product-search" data-admin-product-search-wrap>
                <label class="admin-product-search__label" for="admin-product-search-input">搜索商品</label>
                <div class="admin-product-search__control">
                  <input
                    id="admin-product-search-input"
                    class="admin-product-search__input"
                    type="search"
                    placeholder="输入商品名称，例如：连衣裙、外套"
                    data-admin-product-search
                  />
                  <button
                    class="admin-product-search__clear"
                    type="button"
                    data-admin-product-search-clear
                    hidden
                  >
                    清空
                  </button>
                </div>
              </div>

              <div class="admin-product-filter" data-admin-product-filter-bar></div>

              <p class="admin-feedback" data-admin-product-manage-feedback aria-live="polite"></p>

              <div class="admin-list" data-admin-products-list></div>
            </div>
          </section>

          <section class="admin-panel" data-admin-panel="product-create">
            <div class="admin-panel__header">
              <div>
                <p class="admin-panel__eyebrow">新增商品</p>
                <h2>上架新品</h2>
              </div>
              <p class="admin-panel__note">填写商品基础信息，支持一行或多行 SKU 设置，并上传本地商品主图。</p>
            </div>

            <form class="admin-form admin-form--product-create" data-admin-product-form>
              <label class="admin-field">
                <span>商品名称</span>
                <input type="text" name="name" placeholder="例如：海盐泡泡袖连衣裙" />
              </label>

              <label class="admin-field">
                <span>分类</span>
                <input type="text" name="category" placeholder="例如：连衣裙" />
              </label>

              <label class="admin-field admin-field--wide">
                <span>多 SKU 设置（SKU 名称 | 价格 | 库存）</span>
                <textarea
                  name="skuRows"
                  rows="6"
                  placeholder="一行一个 SKU：SKU名称|价格|库存&#10;例如：默认规格|399|20&#10;白色S码|399|10&#10;白色M码|399|8&#10;灰色L码|429|5"
                ></textarea>
                <small>支持只填写一行。每一行代表一个 SKU，格式固定为：SKU名称|价格|库存。</small>
              </label>

              <label class="admin-field">
                <span>标签</span>
                <input type="text" name="badge" placeholder="新品 / 热卖 / 推荐" />
              </label>

              <label class="admin-field">
                <span>商品主图</span>
                <input type="file" name="image" accept="image/*" />
              </label>

              <label class="admin-field">
                <span>商品描述</span>
                <textarea name="detail" rows="4" placeholder="简单描述商品卖点"></textarea>
              </label>

              <button class="admin-submit" type="submit">上架新品</button>
              <p class="admin-feedback" data-admin-product-feedback aria-live="polite"></p>
            </form>
          </section>

          <section class="admin-panel" data-admin-panel="stats">
            <div class="admin-panel__header">
              <div>
                <p class="admin-panel__eyebrow">销量统计</p>
                <h2>销售概览</h2>
              </div>
              <p class="admin-panel__note">按数据库订单和商品销量记录聚合销量与营业额。</p>
            </div>
            <div class="admin-summary-grid" data-admin-stats-summary></div>
            <div class="admin-stats-body" data-admin-stats-rows></div>
          </section>
        </section>
      </div>
    </main>

    <script type="module" src="./src/main.js?v=20260709-admin-auth-state"></script>
  </body>
</html>
